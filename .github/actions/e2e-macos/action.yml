name: vpnctl macOS E2E
description: Build vpnctl, install it with sing-box, and run the structural E2E scenarios against the real macOS runner.

inputs:
  scenario:
    description: "Which scenario to run: structural | update-race | all"
    required: false
    default: all

runs:
  using: composite
  steps:
    - uses: oven-sh/setup-bun@v2
      with:
        bun-version: "1.3.14"
    - shell: bash
      run: bun install --frozen-lockfile
    - name: Build binaries (native arch)
      shell: bash
      run: |
        bun run build
        bun run build:daemons
    - name: Install built binaries onto PATH
      shell: bash
      run: |
        mkdir -p "$HOME/.local/bin"
        cp dist/vpnctl dist/vpnctl-monitor dist/vpnctl-tunnel "$HOME/.local/bin/"
        chmod +x "$HOME/.local/bin/vpnctl" "$HOME/.local/bin/vpnctl-monitor" "$HOME/.local/bin/vpnctl-tunnel"
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"
    - name: Install sing-box
      shell: bash
      run: brew install sing-box
    - name: Run E2E scenarios
      shell: bash
      # CI reaches api.github.com, so enforce the live-update/version-bump leg
      # of update-race rather than letting it skip.
      env:
        E2E_REQUIRE_LIVE_UPDATE: "1"
      run: VPNCTL_BIN="$HOME/.local/bin/vpnctl" bash scripts/e2e/run.sh "${{ inputs.scenario }}"
