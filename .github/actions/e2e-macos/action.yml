name: vpnctl macOS E2E
description: Build vpnctl, install it with sing-box, and run the structural E2E scenarios against the real macOS runner.

inputs:
  scenario:
    description: "Which scenario to run: structural | update-race | all"
    required: false
    default: all

runs:
  using: composite
  steps:
    - uses: oven-sh/setup-bun@v2
      with:
        bun-version: "1.3.14"
    - shell: bash
      run: bun install --frozen-lockfile
    - name: Build binaries (native arch)
      shell: bash
      run: |
        bun run build
    - name: Install built binaries onto PATH
      shell: bash
      run: |
        mkdir -p "$HOME/.local/bin"
        rm -f "$HOME/.local/bin/vpnctl" "$HOME/.local/bin/vpnctl-monitor" "$HOME/.local/bin/vpnctl-tunnel" "$HOME/.local/bin/vpnctl-tray"
        rm -rf "$HOME/.local/bin/traybin"
        cp -p dist/vpnctl "$HOME/.local/bin/vpnctl"
        ln "$HOME/.local/bin/vpnctl" "$HOME/.local/bin/vpnctl-monitor"
        ln "$HOME/.local/bin/vpnctl" "$HOME/.local/bin/vpnctl-tunnel"
        ln "$HOME/.local/bin/vpnctl" "$HOME/.local/bin/vpnctl-tray"
        cp -R dist/traybin "$HOME/.local/bin/"
        chmod +x "$HOME/.local/bin/vpnctl" "$HOME/.local/bin/vpnctl-monitor" "$HOME/.local/bin/vpnctl-tunnel" "$HOME/.local/bin/vpnctl-tray"
        chmod +x "$HOME/.local/bin/traybin/"*
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"
    - name: Install sing-box
      shell: bash
      run: brew install sing-box
    - name: Run E2E scenarios
      shell: bash
      # The live-update leg of update-race hits api.github.com, which resets the
      # TLS handshake from GitHub-hosted macOS runners too (curl error 35) — so
      # it is left best-effort (skips when unreachable). The EIO-5 redeploy
      # regression it guards is proven network-free by re-installing over the
      # running daemons, which runs unconditionally. Set E2E_REQUIRE_LIVE_UPDATE=1
      # only in an environment with reliable api.github.com reachability.
      run: VPNCTL_BIN="$HOME/.local/bin/vpnctl" bash scripts/e2e/run.sh "${{ inputs.scenario }}"
